<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Map Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrolling */
            background-color: #87CEEB; /* Sky blue background */
        }
        canvas {
            display: block;
        }
        /* Joystick Containers */
        #joystick-left, #joystick-right {
            position: absolute;
            bottom: 20px;
            width: 120px;
            height: 120px;
            z-index: 10;
        }
        #joystick-left { left: 20px; }
        #joystick-right { right: 20px; }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Map...</div>
    <div id="joystick-left"></div>
    <div id="joystick-right"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING (So the map isn't pitch black)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 3. LOAD THE MAP
        const loader = new THREE.GLTFLoader();
        // Make sure your file is renamed to map.glb in your repository!
        loader.load('map.glb', function (gltf) {
            scene.add(gltf.scene);
            document.getElementById('loading').style.display = 'none';
        }, undefined, function (error) {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = "Error loading map. Check console.";
        });

        // 4. SET STARTING POSITION
        // You may need to change these numbers depending on how large/small your map is
        camera.position.set(0, 5, 10); 

        // 5. JOYSTICK SETUP
        let moveData = { forward: 0, right: 0 };
        let lookData = { pitch: 0, yaw: 0 };

        // Left Joystick (Movement)
        const joystickL = nipplejs.create({
            zone: document.getElementById('joystick-left'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white'
        });

        joystickL.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = data.force > 1 ? 1 : data.force; // Normalize speed
            // Calculate X and Z movement based on joystick angle
            moveData.right = Math.cos(angle) * force * 0.2; 
            moveData.forward = Math.sin(angle) * force * 0.2;
        });
        joystickL.on('end', () => { moveData = { forward: 0, right: 0 }; });

        // Right Joystick (Looking around)
        const joystickR = nipplejs.create({
            zone: document.getElementById('joystick-right'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white'
        });

        joystickR.on('move', (evt, data) => {
            const force = data.force > 1 ? 1 : data.force;
            // Negative/positive based on joystick direction
            lookData.yaw = -Math.cos(data.angle.radian) * force * 0.03;
            lookData.pitch = Math.sin(data.angle.radian) * force * 0.03;
        });
        joystickR.on('end', () => { lookData = { pitch: 0, yaw: 0 }; });

        // 6. ANIMATION LOOP (Runs every frame)
        function animate() {
            requestAnimationFrame(animate);

            // Handle looking around
            camera.rotation.y += lookData.yaw;
            camera.rotation.x += lookData.pitch;
            
            // Clamp looking up and down so you don't flip backwards
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));

            // Handle movement (relative to where the camera is facing)
            camera.translateX(moveData.right);
            camera.translateZ(-moveData.forward);
            
            // Keep the camera from rolling (tilting side to side)
            camera.rotation.z = 0; 

            renderer.render(scene, camera);
        }

        animate();

        // 7. HANDLE WINDOW RESIZING
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
