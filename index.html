<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* UI Overlay */
        .ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }

        .btn.active {
            background: #ff477e;
            border-color: #ff85a2;
            box-shadow: 0 0 20px rgba(255, 71, 126, 0.6);
        }

        #instruction {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div id="instruction">Orbit mode: Drag to rotate | Pinch to zoom</div>
        <button id="interact-btn" class="btn">Interact Mode: OFF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x00a8ff, 1, 10);
        pointLight.position.set(-3, 3, 3);
        scene.add(pointLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't go too far below ground

        // --- State Variables ---
        let jellyMesh = null;
        let isInteractMode = false;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Custom Uniforms for the Jelly Wobble Shader
        const jellyUniforms = {
            uTime: { value: 0 },
            uImpactPoint: { value: new THREE.Vector3() },
            uImpactTime: { value: -999.0 }, // Start far in the past
            uWobbleStrength: { value: 0.0 }
        };

        // --- Load the GLTF Jelly Model ---
        const loader = new THREE.GLTFLoader();
        
        // Target 'Jel.glb' assuming it sits in the same repository folder
        loader.load('Jel.glb', function (gltf) {
            const model = gltf.scene;
            
            // Center the model automatically
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            // Inject custom Jelly Material behavior into the model
            model.traverse(function (child) {
                if (child.isMesh) {
                    jellyMesh = child;
                    modifyMaterial(child);
                }
            });

            scene.add(model);
        }, undefined, function (error) {
            console.error('Error loading Jel.glb:', error);
        });

        // --- Custom Jelly Material Modification ---
        function modifyMaterial(mesh) {
            // Take the existing material or create a nice shiny jelly-like default
            const oldMat = mesh.material;
            
            const jellyMat = new THREE.MeshStandardMaterial({
                color: oldMat ? oldMat.color : 0xff477e,
                roughness: 0.1,
                metalness: 0.1,
                clearcoat: 1.0,      // Makes it look wet/shiny
                clearcoatRoughness: 0.1
            });

            // Inject custom math logic into the vertex shader compiled by Three.js
            jellyMat.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = jellyUniforms.uTime;
                shader.uniforms.uImpactPoint = jellyUniforms.uImpactPoint;
                shader.uniforms.uImpactTime = jellyUniforms.uImpactTime;

                // Add uniforms to vertex shader header
                shader.vertexShader = `
                    uniform float uTime;
                    uniform vec3 uImpactPoint;
                    uniform float uImpactTime;
                    ${shader.vertexShader}
                `;

                // Modify the vertex positions right before they transform
                shader.vertexShader = shader.vertexShader.replace(
                    '#include <begin_vertex>',
                    `
                    #include <begin_vertex>
                    
                    // Calculate distance from the interaction impact point to this vertex
                    // Transform transformed position to world space to compare accurately
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    float dist = distance(worldPosition.xyz, uImpactPoint);
                    
                    // Time elapsed since user touched it
                    float timeSinceImpact = uTime - uImpactTime;
                    
                    // Only wobble within a wave duration (e.g., 2.0 seconds) and close to the touch point
                    if (timeSinceImpact > 0.0 && timeSinceImpact < 2.0 && dist < 1.5) {
                        // Decay over time and distance
                        float wave = sin(timeSinceImpact * 15.0 - dist * 8.0);
                        float amplitude = 0.15 * exp(-timeSinceImpact * 2.0) * (1.0 - dist/1.5);
                        
                        // Push the vertex outward along its normal vector
                        transformed += objectNormal * wave * amplitude;
                    }
                    `
                );
            };

            mesh.material = jellyMat;
        }

        // --- UI Interactions ---
        const interactBtn = document.getElementById('interact-btn');
        const instruction = document.getElementById('instruction');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            if (isInteractMode) {
                interactBtn.textContent = "Interact Mode: ON";
                interactBtn.classList.add('active');
                instruction.textContent = "Tap anywhere on the Jelly to poke it!";
                controls.enabled = false; // Stop camera rotation so user can poke mesh
            } else {
                interactBtn.textContent = "Interact Mode: OFF";
                interactBtn.classList.remove('active');
                instruction.textContent = "Orbit mode: Drag to rotate | Pinch to zoom";
                controls.enabled = true; // Turn camera controls back on
            }
        });

        // --- Handle Taps/Clicks on the Jelly ---
        function handleInteraction(event) {
            if (!isInteractMode || !jellyMesh) return;

            // Normalize coordinates for Raycasting (works for both desktop & mobile)
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(jellyMesh);

            if (intersects.length > 0) {
                // We hit the jelly! Send the exact point of intersection to the shader
                jellyUniforms.uImpactPoint.value.copy(intersects[0].point);
                jellyUniforms.uImpactTime.value = clock.getElapsedTime();
            }
        }

        window.addEventListener('mousedown', handleInteraction);
        window.addEventListener('touchstart', handleInteraction, { passive: true });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            jellyUniforms.uTime.value = elapsedTime;

            // Idle micro-wobble so it feels alive even when untouched
            if (jellyMesh && !isInteractMode) {
                jellyMesh.rotation.y = Math.sin(elapsedTime * 0.5) * 0.05;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- Handle Resizing ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
