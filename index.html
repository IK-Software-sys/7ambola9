<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer & Interactor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.active {
            background: #ff2a74;
            border-color: #ff6699;
            box-shadow: 0 0 20px rgba(255, 42, 116, 0.6);
        }

        #status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
        }

        /* Loading Screen */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            transition: opacity 0.5s ease;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">Loading Jelly Model...</div>
    <div id="canvas-container"></div>

    <div id="ui-container">
        <div id="status-text">Mode: View & Rotate</div>
        <button id="interact-btn" class="btn">Interact Mode: OFF</button>
    </div>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Soft background color gradients can be handled via renderer
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x00aaff, 1, 10);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't go completely under floor

        // --- Jelly Physics State Variables ---
        let jellyMesh = null;
        let originalPositions = null;
        let currentPositions = null;
        let velocities = null;
        let isInteractMode = false;
        let isPointerDown = false;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // --- Load GLTF Model ---
        const loader = new THREE.GLTFLoader();
        
        // Relative path looks for 'Jel.glb' in the same root folder on GitHub
        loader.load('./Jel.glb', function (gltf) {
            const model = gltf.scene;
            
            // Traverse model to find the core mesh
            model.traverse((child) => {
                if (child.isMesh && !jellyMesh) {
                    jellyMesh = child;
                    
                    // Make sure geometry is unique and read/write accessible
                    jellyMesh.geometry = jellyMesh.geometry.clone();
                    
                    const posAttr = jellyMesh.geometry.attributes.position;
                    originalPositions = posAttr.array.slice(); // Clone original shape
                    currentPositions = posAttr.array;          // Reference live array
                    velocities = new Float32Array(posAttr.count * 3); // Track velocity per axis per vertex
                    
                    // Optional: Boost look of slime materials if desired
                    if(jellyMesh.material) {
                        jellyMesh.material.roughness = 0.1;
                        jellyMesh.material.metalness = 0.1;
                    }
                }
            });

            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 

            scene.add(model);
            
            // Hide loading screen
            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

        }, undefined, function (error) {
            console.error('An error happened while loading the GLB file:', error);
            document.getElementById('loading').innerText = "Failed to load 'Jel.glb'. Check file path!";
        });

        // --- Interaction Toggle Logic ---
        const interactBtn = document.getElementById('interact-btn');
        const statusText = document.getElementById('status-text');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            if (isInteractMode) {
                interactBtn.innerText = "Interact Mode: ON";
                interactBtn.classList.add('active');
                statusText.innerText = "Action: Drag/Touch the jelly to squish it!";
                controls.enabled = false; // Turn off orbital rotation so we can deform it instead
            } else {
                interactBtn.innerText = "Interact Mode: OFF";
                interactBtn.classList.remove('active');
                statusText.innerText = "Mode: View & Rotate";
                controls.enabled = true;  // Re-enable orbiting camera controls
            }
        });

        // --- Pointer/Touch Tracking ---
        function updatePointer(event) {
            let clientX = event.clientX;
            let clientY = event.clientY;
            
            // Handle mobile touches
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointerdown', (e) => {
            isPointerDown = true;
            updatePointer(e);
            if(isInteractMode) deformJelly();
        });

        window.addEventListener('pointermove', (e) => {
            updatePointer(e);
            if (isInteractMode && isPointerDown) {
                deformJelly();
            }
        });

        window.addEventListener('pointerup', () => { isPointerDown = false; });
        window.addEventListener('touchmove', (e) => { if(isInteractMode) e.preventDefault(); }, { passive: false });

        // --- Slime/Jelly Physics Engine ---
        function deformJelly() {
            if (!jellyMesh || !currentPositions) return;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(jellyMesh);

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                // Convert world contact point to local mesh space
                const localHitPoint = jellyMesh.worldToLocal(hitPoint.clone());

                const radius = 0.8;      // Radius of influence for deformation
                const strength = 0.25;    // How deep the deformation pushes

                for (let i = 0; i < currentPositions.length / 3; i++) {
                    const idx = i * 3;
                    
                    // Vertex positions
                    const vx = currentPositions[idx];
                    const vy = currentPositions[idx + 1];
                    const vz = currentPositions[idx + 2];

                    // Distance from pointer impact
                    const dx = vx - localHitPoint.x;
                    const dy = vy - localHitPoint.y;
                    const dz = vz - localHitPoint.z;
                    const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (distance < radius) {
                        // Soft-falloff calculation
                        const falloff = (1 - distance / radius) * strength;
                        
                        // Push vertices outward/inward based on drag impact vectors
                        velocities[idx] += dx * falloff;
                        velocities[idx + 1] += dy * falloff;
                        velocities[idx + 2] += dz * falloff;
                    }
                }
            }
        }

        // --- Physics & Render Animation Frame loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // 1. Process Jelly Spring Jiggle Math
            if (jellyMesh && originalPositions) {
                const posAttr = jellyMesh.geometry.attributes.position;
                
                const stiffness = 0.12;  // Spring snap-back tight force
                const damping = 0.82;    // Slime viscosity/slowdown rate (lower = more syrup-like)

                for (let i = 0; i < posAttr.count; i++) {
                    const idx = i * 3;

                    // Spring physics formula towards target rest-shape anchor: F = -kx - cv
                    let fx = (originalPositions[idx] - currentPositions[idx]) * stiffness;
                    let fy = (originalPositions[idx + 1] - currentPositions[idx + 1]) * stiffness;
                    let fz = (originalPositions[idx + 2] - currentPositions[idx + 2]) * stiffness;

                    velocities[idx] = (velocities[idx] + fx) * damping;
                    velocities[idx + 1] = (velocities[idx + 1] + fy) * damping;
                    velocities[idx + 2] = (velocities[idx + 2] + fz) * damping;

                    currentPositions[idx] += velocities[idx];
                    currentPositions[idx + 1] += velocities[idx + 1];
                    currentPositions[idx + 2] += velocities[idx + 2];
                }
                
                // Alert WebGL that geometry attributes have shifted dynamically
                posAttr.needsUpdate = true;
                jellyMesh.geometry.computeVertexNormals();
            }

            // 2. Camera Controls update
            if (!isInteractMode) {
                controls.update();
            }

            renderer.render(scene, camera);
        }

        // --- Window Resize optimization ---
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize Loop
        animate();
    </script>
</body>
</html>
