<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer & Interactor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.active {
            background: #ff2a74;
            border-color: #ff6699;
            box-shadow: 0 0 20px rgba(255, 42, 116, 0.6);
        }

        #status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            transition: opacity 0.5s ease;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">
        <div id="loading-text">Loading Jelly Model...</div>
    </div>
    
    <div id="canvas-container"></div>

    <div id="ui-container">
        <div id="status-text">Mode: View & Rotate</div>
        <button id="interact-btn" class="btn">Interact Mode: OFF</button>
    </div>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        container.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(10, 10, 0xff2a74, 0x444466);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0x00aaff, 0.5);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Physics State ---
        let jellyMesh = null;
        let originalPositions = null;
        let currentPositions = null;
        let velocities = null;
        let isInteractMode = false;
        let isPointerDown = false;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // --- Geometry Normalizing Loader ---
        const loader = new THREE.GLTFLoader();
        
        loader.load('./Jel.glb', function (gltf) {
            const model = gltf.scene;
            
            model.traverse((child) => {
                if (child.isMesh && !jellyMesh) {
                    jellyMesh = child;
                    
                    // 1. Un-index the geometry so individual vertices can stretch freely
                    if (jellyMesh.geometry.index) {
                        jellyMesh.geometry = jellyMesh.geometry.toNonIndexed();
                    } else {
                        jellyMesh.geometry = jellyMesh.geometry.clone();
                    }
                    
                    // 2. Natively center the raw math coordinates to 0,0,0
                    jellyMesh.geometry.computeBoundingBox();
                    const center = new THREE.Vector3();
                    jellyMesh.geometry.boundingBox.getCenter(center);
                    jellyMesh.geometry.translate(-center.x, -center.y, -center.z);

                    // 3. Natively scale the raw math coordinates so the width is exactly 2.0
                    jellyMesh.geometry.computeBoundingBox();
                    const size = new THREE.Vector3();
                    jellyMesh.geometry.boundingBox.getSize(size);
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scaleFactor = 2 / maxDim;
                    jellyMesh.geometry.scale(scaleFactor, scaleFactor, scaleFactor);

                    // 4. NOW we capture the coordinates for physics (they are perfectly normalized)
                    const posAttr = jellyMesh.geometry.attributes.position;
                    originalPositions = posAttr.array.slice(); 
                    currentPositions = posAttr.array;          
                    velocities = new Float32Array(posAttr.count * 3); 

                    if(jellyMesh.material) {
                        jellyMesh.material.roughness = 0.1;
                        jellyMesh.material.metalness = 0.1;
                        jellyMesh.material.side = THREE.DoubleSide; 
                    }
                }
            });

            scene.add(model);
            
            camera.position.set(0, 1.5, 4);
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

        }, function (xhr) {
            if(xhr.total > 0) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading-text').innerText = `Loading: ${percent}%`;
            }
        }, function (error) {
            console.error(error);
            document.getElementById('loading-text').innerHTML = 
                `<span style="color: #ff2a74;">Error loading 'Jel.glb'</span>`;
        });

        // --- UI Interactions ---
        const interactBtn = document.getElementById('interact-btn');
        const statusText = document.getElementById('status-text');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            if (isInteractMode) {
                interactBtn.innerText = "Interact Mode: ON";
                interactBtn.classList.add('active');
                statusText.innerText = "Action: Drag/Touch the jelly directly to squish it!";
                controls.enabled = false; 
            } else {
                interactBtn.innerText = "Interact Mode: OFF";
                interactBtn.classList.remove('active');
                statusText.innerText = "Mode: View & Rotate";
                controls.enabled = true;  
            }
        });

        // --- Touch Inputs ---
        function updatePointer(event) {
            let clientX = event.clientX;
            let clientY = event.clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }
            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointerdown', (e) => {
            isPointerDown = true;
            updatePointer(e);
            if(isInteractMode) deformJelly();
        });

        window.addEventListener('pointermove', (e) => {
            updatePointer(e);
            if (isInteractMode && isPointerDown) deformJelly();
        });

        window.addEventListener('pointerup', () => { isPointerDown = false; });
        window.addEventListener('touchmove', (e) => { if(isInteractMode) e.preventDefault(); }, { passive: false });

        // --- Jelly Physics Deformation ---
        function deformJelly() {
            if (!jellyMesh || !currentPositions) return;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(jellyMesh);

            if (intersects.length > 0) {
                // Since the geometry itself was scaled, world and local hit points align perfectly
                const localHitPoint = jellyMesh.worldToLocal(intersects[0].point.clone());

                // These values will now reliably work because the model is always 2 units wide!
                const radius = 0.5;      
                const strength = 0.3;    

                for (let i = 0; i < currentPositions.length / 3; i++) {
                    const idx = i * 3;
                    
                    const dx = currentPositions[idx] - localHitPoint.x;
                    const dy = currentPositions[idx + 1] - localHitPoint.y;
                    const dz = currentPositions[idx + 2] - localHitPoint.z;
                    const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (distance < radius) {
                        const falloff = (1 - distance / radius) * strength;
                        velocities[idx] += dx * falloff;
                        velocities[idx + 1] += dy * falloff;
                        velocities[idx + 2] += dz * falloff;
                    }
                }
            }
        }

        // --- Frame Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (jellyMesh && originalPositions) {
                const posAttr = jellyMesh.geometry.attributes.position;
                
                // Tweak these to change how the jelly feels!
                const stiffness = 0.15;  // How fast it snaps back
                const damping = 0.85;    // How long it wiggles before stopping

                for (let i = 0; i < posAttr.count; i++) {
                    const idx = i * 3;

                    let fx = (originalPositions[idx] - currentPositions[idx]) * stiffness;
                    let fy = (originalPositions[idx + 1] - currentPositions[idx + 1]) * stiffness;
                    let fz = (originalPositions[idx + 2] - currentPositions[idx + 2]) * stiffness;

                    velocities[idx] = (velocities[idx] + fx) * damping;
                    velocities[idx + 1] = (velocities[idx + 1] + fy) * damping;
                    velocities[idx + 2] = (velocities[idx + 2] + fz) * damping;

                    currentPositions[idx] += velocities[idx];
                    currentPositions[idx + 1] += velocities[idx + 1];
                    currentPositions[idx + 2] += velocities[idx + 2];
                }
                
                posAttr.needsUpdate = true;
                jellyMesh.geometry.computeVertexNormals(); // Recalculates lighting to look smooth while moving
            }

            if (!isInteractMode) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
